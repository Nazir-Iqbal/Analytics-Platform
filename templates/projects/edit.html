{% extends 'base.html' %}
{% block title %}Edit {{ project.name }} - Analytics Platform{% endblock %}
{% block content %}
<div class="card">
    <h2>Edit Project</h2>
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Project Name</label>
            <input type="text" id="name" name="name" value="{{ project.name }}" required maxlength="200">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ project.description }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'projects:detail' pk=project.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
