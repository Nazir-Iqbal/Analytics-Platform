{% extends 'base.html' %}
{% block title %}New Project - Analytics Platform{% endblock %}
{% block content %}
<div class="card">
    <h2>Create New Project</h2>
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Project Name</label>
            <input type="text" id="name" name="name" required maxlength="200" placeholder="My Analysis Project">
        </div>
        <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea id="description" name="description" rows="3" placeholder="What is this project about?"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Project</button>
            <a href="{% url 'projects:list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
