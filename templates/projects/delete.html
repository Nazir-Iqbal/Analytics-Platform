{% extends 'base.html' %}
{% block title %}Delete {{ project.name }} - Analytics Platform{% endblock %}
{% block content %}
<div class="card">
    <h2>Delete Project</h2>
    <p>Are you sure you want to delete <strong>{{ project.name }}</strong>? This will also delete all datasets and ML results in this project.</p>
    <form method="post" class="form-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'projects:detail' pk=project.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
