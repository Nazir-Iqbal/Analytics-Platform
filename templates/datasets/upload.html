{% extends 'base.html' %}
{% block title %}Upload Dataset - Analytics Platform{% endblock %}
{% block content %}
<div class="card">
    <h2>Upload Dataset to "{{ project.name }}"</h2>
    <form method="post" enctype="multipart/form-data" class="form">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Dataset Name (optional)</label>
            <input type="text" id="name" name="name" maxlength="200" placeholder="Leave blank to use filename">
        </div>
        <div class="form-group">
            <label for="file">CSV File</label>
            <input type="file" id="file" name="file" accept=".csv" required>
            <small class="help-text">Maximum file size: 50MB</small>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Upload</button>
            <a href="{% url 'projects:detail' pk=project.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
