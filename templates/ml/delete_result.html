{% extends 'base.html' %}
{% block title %}Delete Result{% endblock %}
{% block content %}
<div class="card">
    <h2>Delete ML Result</h2>
    <p>Are you sure you want to delete the <strong>{{ result.get_model_name_display }}</strong> result on {{ result.dataset.name }}?</p>
    <form method="post" class="form-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'ml:result' pk=result.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
